<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сумасшедшая Фабрика: 1-66</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <h1>🎲 Сумасшедшая Фабрика: 1-66</h1>
        
<div class="controls">
    <div id="setup-area">
        <span>Количество игроков:</span>
        <button onclick="startGame(1)">1 Игрок</button>
        <button onclick="startGame(2)">2 Игрока</button>
        <button onclick="startGame(3)">3 Игрока</button>

        <label for="dice-count-select" style="font-size: 13px; margin-right: 5px;">Кубики:</label>
        <select id="dice-count-select" style="padding: 3px; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; margin-right: 10px;">
            <option value="2">2 кубика (2-12)</option>
            <option value="1">1 кубик (1-6)</option>
        </select>

        <label for="difficulty-select" style="font-size: 13px; margin-right: 5px;">Сложность:</label>
        <select id="difficulty-select" style="padding: 3px; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; margin-right: 15px;">
            <option value="hard">Хардкор (Ловушки отбрасывают в 2 раза дальше)</option>
            <option value="normal">Обычная (Ловушки активны)</option>
            <option value="easy">Легкая (Без ловушек)</option>
        </select>
    </div>
    
    <div id="action-area" style="display: none;">
        <button id="roll-btn">Бросить кубик</button>
        <button id="restart-btn" class="restart-btn">Начать заново</button>
        <span id="status">Ход Игрока 1</span>
    </div>
</div>

        <div class="game-layout">
            <div class="history-panel">
                <div class="history-header">📋 История ходов</div>
                <div id="history-log" class="history-log">
                    <div style="color: #666; text-align: center; margin-top: 20px;">Игра еще не началась</div>
                </div>
            </div>

            <div class="board-wrapper">
                <img src="board.jpg" alt="Игровое поле" class="board-bg">
                <div id="tokens-layer" class="tokens-layer"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    
    <div id="game-modal" class="modal-overlay" style="display: none;">
    <div class="modal-card">
        <div id="modal-icon" class="modal-emoji">💥</div>
        <h2 id="modal-title">СОБЫТИЕ НА ФАБРИКЕ!</h2>
        <p id="modal-text">Игрок попал в ловушку...</p>
        <div id="modal-action-space">
            <button id="modal-close-btn" onclick="closeGameModal()">ПОНЯТНО</button>
        </div>
    </div>
</div>
</body>
</html>
